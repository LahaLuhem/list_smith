name: list_smith
description: >-
  A developer-first Flutter package that wraps ListView.builder for real-world
  lists: async pagination, pull-to-refresh, and sync-or-async search.
version: 0.1.0
homepage: https://github.com/LahaLuhem/list_smith?tab=readme-ov-file
repository: https://github.com/LahaLuhem/list_smith
issue_tracker: https://github.com/LahaLuhem/list_smith/issues

topics:
  - listview
  - pagination
  - infinite-scroll
  - pull-to-refresh
  - search

screenshots:
  - description: >-
      A tour: async pagination and pull-to-refresh, client-side search with the no-results
      surface, and grouping into labelled sections.
    path: doc/screenshots/1-overview.webp
  - description: >-
      Grouping a filtered list into labelled sections, rendered natively on Android (Material).
    path: doc/screenshots/2-android-material.png
  - description: >-
      The same list and code, rendered natively on iOS (Cupertino).
    path: doc/screenshots/3-ios-cupertino.png

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  infinite_scroll_pagination: ^5.1.1
  custom_refresh_indicator: ^4.0.1
  collection: ^1.19.1
  meta: ^1.18.0
  pool: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bdd_framework: ^4.0.7
  benchmark_harness: ^2.4.0
  checks: ^0.3.1

cider:
  link_template:
    tag: https://github.com/LahaLuhem/list_smith/releases/tag/%tag%
    diff: https://github.com/LahaLuhem/list_smith/compare/%from%...%to%
